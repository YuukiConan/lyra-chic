    <script>
        const stored = localStorage.getItem("darkMode");
        let preferredColorTheme;

        if (stored !== null) {
            preferredColorTheme = (stored === "true");
        } else {
            preferredColorTheme = window.matchMedia && window.matchMedia('prefers-color-scheme: dark').matches;
        }

        document.documentElement.setAttribute('data-theme', preferredColorTheme ? 'dark' : 'light');
       
    </script>
